# Hyprland Configuration File
# See https://wiki.hyprland.org/Configuring/ for full documentation

# Define programs
$terminal = alacritty
$fileManager = thunar
$editor = nvim
$menu = tofi-drun -c ~/.config/tofi/configA --drun-launch=true

#exec-once = mpvpaper -o "loop no-audio" '*' ~/Downloads/.wallpaper/got.mp4
#exec-once = bash -c 'WALLPAPER_DIR="$HOME/Downloads/.wallpaper/gif"; while true; do for video in "$WALLPAPER_DIR"/*.{mp4,mkv,webm,gif}; do [ -e "$video" ] || continue; pkill -x mpvpaper 2>/dev/null; mpvpaper -o "no-audio" "*" "$video"; done; done'
 # exec-once = sleep 0.5 && swww img "/home/ritish/Downloads/.wallpaper/wallpaper.jpg"
 # exec-once = bash -c 'WALLPAPER_DIR="$HOME/Downloads/.private"; while true; do IMG=$(find "$WALLPAPER_DIR" -type f | shuf -n 1); swww img "$IMG" --transition-type grow --transition-duration 3 --resize fit; sleep 5; done'

# Launch Discord minimized on startup
# exec-once = discord --start-minimized
exec-once = chromium --no-startup-window
exec-once = swww-daemon 
exec-once = gammastep -c /home/ritish/.config/gammastep/config.ini
exec-once = waybar
exec-once = emote
exec-once = bash -c 'BAT=/sys/class/power_supply/BAT1; while true; do CAP=$(<"$BAT/capacity"); STAT=$(<"$BAT/status"); if [[ "$STAT" != "Charging" && "$STAT" != "Full" && "$CAP" -le 25 ]]; then dunstify -u critical -i battery-caution "⚡ Battery Low" "Battery at ${CAP}% (${STAT})"; fi; sleep 60; done' &
exec-once = dunst
exec-once = hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hypridle
monitor=eDP-1,preferred,auto,1.2

# Input settings
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0.5
    touchpad {
        natural_scroll = false
        middle_button_emulation = false 
    }
}

# Gestures
gestures {
gesture = 3, horizontal, workspace
}

# Device settings
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# General look and feel
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 4
    col.active_border = rgba(00ff0055)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    layout = dwindle
}

# Decoration settings
decoration {
    rounding = 10
 blur {
        enabled = false
#        brightness = 2
    }
    shadow {
    enabled = false
  #  range = 20
	#    color = 0x2211ff11
    }
#    active_opacity = 0.9
#  inactive_opacity = 0.8
}

misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
    vrr = 0
}

# Animations
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 4, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 3, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, default
}

# Dwindle layout settings
dwindle {
    preserve_split = true
    force_split = 0      # Default flex behavior, works with smart_split
}# Keybinds

# Window rules
windowrulev2 = size 800 600,floating:1
#windowrulev2 = opacity 0.80 0.70,class:^(nm-applet)$
#windowrulev2 = opacity 0.85 0.8,class:^(Alacritty)$

# Layer rules
layerrule = ignorezero,tofi
layerrule = ignorezero,dunst
layerrule = blur,dunst

bind = , mouse:274, exec,
bind = SUPER, T, exec, $terminal
bind = SUPER, F, exec, $fileManager
bind = SUPER, A, exec, $menu
bind = SUPER, B, exec, firefox
bind = SUPER, E, exec, emote  
bind = SUPER, Q, killactive
bind = SUPER_SHIFT, Q, exec, bash -c 'ws=$(hyprctl activeworkspace -j | jq ".id"); \
  hyprctl clients -j | jq -r ".[] | select(.workspace.id == $ws) | .pid" | \
  xargs -r kill -9'
bind = SUPER, M, exit
bind = SUPER, S, togglesplit  # Toggle split direction
bind = SUPER, W, exec, bash -c 'hyprctl dispatch togglefloating; sleep 0.05; ADDR=$(hyprctl activewindow -j | jq -r ".address"); [ -n "$ADDR" ] && hyprctl dispatch resizewindowpixel exact 700 700,address:$ADDR'
bind = SUPER_ALT, H, movefocus, l
bind = SUPER_ALT, L, movefocus, r
bind = SUPER_ALT, K, movefocus, u
bind = SUPER_ALT, J, movefocus, d
bind = SUPER_SHIFT, H, movewindow, l  # Move window
bind = SUPER_SHIFT, L, movewindow, r
bind = SUPER_SHIFT, K, movewindow, u
bind = SUPER_SHIFT, J, movewindow, d
bindle = SUPER_CTRL, h, resizeactive, -200 0
bindle = SUPER_CTRL, l, resizeactive, 200 0
bindle = SUPER_CTRL, k, resizeactive, 0 -200
bindle = SUPER_CTRL, j, resizeactive, 0 200


bind = SUPER, ESCAPE, exec, wlogout
bind = Ctrl, Escape, exec, killall -r waybar || waybar # toggle waybar
bind = ,Print, exec, grimblast --notify copysave# current Active window only + clipboard copy
bind = SUPER, Print, exec, grimblast --notify copysave area # Select area to take screenshot
bind = SUPER, R, exec, wf-recorder -g "$(slurp)" --audio -f ~/Videos/recording_$(date +%F_%H-%M-%S).mp4

bind = SUPER SHIFT, R, exec, pkill wf-recorder

# Workspace keybinds
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER_SHIFT, 1, movetoworkspace, 1
bind = SUPER_SHIFT, 2, movetoworkspace, 2
bind = SUPER_SHIFT, 3, movetoworkspace, 3
bind = SUPER_SHIFT, 4, movetoworkspace, 4
bind = SUPER_SHIFT, 5, movetoworkspace, 5
bind = SUPER_SHIFT, 6, movetoworkspace, 6
bind = SUPER_SHIFT, 7, movetoworkspace, 7
bind = SUPER_SHIFT, 8, movetoworkspace, 8
bind = SUPER_SHIFT, 9, movetoworkspace, 9
bind = SUPER_ALT,B, workspace, previous
bind = SUPER,L, workspace, e+1
bind = SUPER,H, workspace, e-1
bind = SUPER,N, workspace, +1
bind = SUPER_ALT_SHIFT, L, movetoworkspace, e+1
bind = SUPER_ALT_SHIFT, H, movetoworkspace, e-1
bind = SUPER_ALT_SHIFT, N, movetoworkspace, +1

# Mouse bindings for moving and resizing
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5 --allow-boost
bind = , XF86AudioLowerVolume, exec, pamixer -d 5 
bind = , XF86AudioMicMute, exec, pamixer --default-source -m
bind = , XF86AudioMute, exec, pamixer -t
#bind = , XF86AudioPlay, exec, playerctl play-pause
#bind = , XF86AudioPause, exec, playerctl play-pause
#bind = , XF86AudioNext, exec, playerctl next
#bind = , XF86AudioPrev, exec, playerctl previous

# Screen brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-












